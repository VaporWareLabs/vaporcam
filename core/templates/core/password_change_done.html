{% extends "core/base.html" %}

{% block content %}
<div class="modal fade" id="passwordChangedModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered password-modal">
    <div class="modal-content password-card">

      <div class="modal-header border-0">
        <div class="w-100 text-center">
          <h1 class="password-title">VaporCAM</h1>
          <p class="password-subtitle">Password Changed</p>
        </div>
      </div>

      <div class="modal-body text-center">
        <p>Your password was changed successfully.</p>
      </div>

      <div class="modal-footer border-0 justify-content-center">
        <a class="btn btn-primary" href="{% url 'work_item_list' %}">
          Return to Dashboard
        </a>
      </div>

    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const modalEl = document.getElementById("passwordChangedModal");
    const modal = new bootstrap.Modal(modalEl, {
        backdrop: "static"
    });

    modal.show();
});
</script>
{% endblock %}
